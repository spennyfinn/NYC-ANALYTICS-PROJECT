version: 2

models:
  - name: dim_agency
    description: "One row per NYC agency responsible for handling 311 service requests. Used to look up agency details from the fact table."
    columns:
      - name: agency_key
        description: "Surrogate key generated by hashing the agency abbreviation. Primary key for this dimension."
        data_tests:
          - unique
          - not_null
      - name: agency
        description: "Abbreviated agency code as reported by the source system (e.g. NYPD, HPD, DOT)."
        data_tests:
          - not_null
      - name: agency_name
        description: "Full descriptive name of the NYC agency (e.g. New York City Police Department)."

  - name: dim_complaint_type
    description: "One row per unique combination of complaint type and descriptor. Captures the nature and detail of each category of 311 request."
    columns:
      - name: complaint_type_key
        description: "Surrogate key generated by hashing complaint_type and descriptor together. Primary key for this dimension."
        data_tests:
          - unique
          - not_null
      - name: complaint_type
        description: "High-level category describing the nature of the 311 request (e.g. Noise - Residential, HEAT/HOT WATER)."
        data_tests:
          - not_null
      - name: descriptor
        description: "More specific detail within the complaint type category (e.g. Loud Music/Party, No Heat)."

  - name: dim_location
    description: "One row per unique combination of borough, ZIP code, and street address. Captures the geographic location of each 311 incident."
    columns:
      - name: location_key
        description: "Surrogate key generated by hashing borough, incident_zip, and incident_address. Primary key for this dimension."
        data_tests:
          - not_null
          - unique
      - name: borough
        description: "NYC borough where the incident occurred (e.g. BROOKLYN, MANHATTAN, QUEENS)."
      - name: incident_zip
        description: "ZIP code of the incident location."
      - name: incident_address
        description: "Street address where the incident was reported."
      - name: city
        description: "City name associated with the incident address."
      - name: latitude
        description: "Latitude coordinate of the incident location, cast to float64."
      - name: longitude
        description: "Longitude coordinate of the incident location, cast to float64."

  - name: dim_date
    description: "Standard date dimension with one row per calendar day from 2010-01-01 to 2030-01-01. Used to enable time-based analysis and trend reporting."
    columns:
      - name: date_key
        description: "Integer surrogate key in YYYYMMDD format (e.g. 20260601). Primary key for this dimension."
        data_tests:
          - unique
          - not_null
      - name: full_date
        description: "The full calendar date value (e.g. 2026-06-01)."
        data_tests:
          - not_null
      - name: year
        description: "Four-digit calendar year extracted from the date (e.g. 2026)."
      - name: quarter
        description: "Calendar quarter number (1-4) extracted from the date."
      - name: month
        description: "Numeric month (1-12) extracted from the date."
      - name: month_name
        description: "Full month name extracted from the date (e.g. January, February)."
      - name: day_of_week
        description: "Full name of the day of the week (e.g. Monday, Saturday)."
      - name: is_weekend
        description: "Boolean flag indicating whether the date falls on a Saturday or Sunday."

  - name: fct_service_requests
    description: "Fact table with one row per 311 service request. Contains foreign keys to all dimensions and measures for analysis."
    columns:
      - name: service_request_key
        description: "Surrogate key generated by hashing unique_key. Primary key for this fact table."
        data_tests:
          - unique
          - not_null
      - name: unique_key
        description: "Natural key from the NYC 311 source system uniquely identifying each service request."
        data_tests:
          - not_null
      - name: date_key
        description: "Foreign key to dim_date representing the date the request was created."
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_date')
              field: date_key
      - name: agency_key
        description: "Foreign key to dim_agency representing the agency assigned to the request."
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_agency')
              field: agency_key
      - name: complaint_type_key
        description: "Foreign key to dim_complaint_type representing the type and descriptor of the complaint."
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_complaint_type')
              field: complaint_type_key
      - name: location_key
        description: "Foreign key to dim_location representing where the incident occurred."
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_location')
              field: location_key
      - name: resolution_time_hours
        description: "Number of hours between request creation and closure. Null if the request has not been closed."
      - name: is_resolved
        description: "Boolean flag indicating whether the request has been closed (true) or remains open (false)."

  


        